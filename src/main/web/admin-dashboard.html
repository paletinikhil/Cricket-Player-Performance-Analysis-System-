<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Admin Dashboard - Cricket Analysis</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
  body {
    min-height: 100vh;
    background:
      linear-gradient(rgba(13, 18, 52, 0.75), rgba(74, 10, 10, 0.64)),
      url('images/cricket-bg.jpg') center/cover fixed no-repeat;
  }
  .navbar {
    background: rgba(18, 16, 45, 0.92) !important;
    backdrop-filter: blur(4px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .hero {
    background: linear-gradient(135deg, rgba(220, 38, 38, 0.92), rgba(245, 158, 11, 0.86));
    color: white;
    border-radius: 16px;
    padding: 20px 22px;
    margin-top: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  }
  .panel {
    background: rgba(255,255,255,0.95);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    margin-top: 16px;
  }
  .action-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .action-btn {
    border: 0;
    border-radius: 12px;
    color: #fff;
    font-weight: 600;
    padding: 12px;
  }
  .bg1 { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
  .bg2 { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
  .bg3 { background: linear-gradient(135deg, #dc2626, #b91c1c); }
  .bg4 { background: linear-gradient(135deg, #0f766e, #0d9488); }
  .bg5 { background: linear-gradient(135deg, #2563eb, #0891b2); }
  .bg6 { background: linear-gradient(135deg, #ea580c, #f59e0b); }
  .bg7 { background: linear-gradient(135deg, #059669, #16a34a); }
  .metric {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 8px 12px;
    display: inline-block;
    margin-right: 8px;
  }
  .result-box {
    background: #111827;
    color: #e5e7eb;
    border-radius: 10px;
    padding: 12px;
    margin-top: 12px;
    white-space: pre-wrap;
  }
  .player-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(240,240,255,0.95));
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    margin: 20px 0;
    border-left: 4px solid #dc2626;
  }
  .player-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
  }
  .player-name {
    font-size: 1.8rem; font-weight: 700; color: #0f172a;
  }
  .player-meta {
    font-size: 0.9rem; color: #64748b; margin-top: 4px;
  }
  .stat-tabs {
    display: flex; gap: 8px; margin: 20px 0; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap;
  }
  .stat-tab {
    padding: 10px 16px; cursor: pointer; font-weight: 600; border: none; background: none; color: #64748b; border-bottom: 3px solid transparent;
  }
  .stat-tab.active {
    color: #dc2626; border-bottom-color: #dc2626;
  }
  .stat-table {
    margin-top: 16px; width: 100%;
  }
  .stat-table thead {
    background: #f1f5f9; font-weight: 700; color: #0f172a;
  }
  .stat-table td, .stat-table th {
    padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0;
  }
  .stat-filter {
    display: flex; gap: 12px; margin: 16px 0; align-items: center; flex-wrap: wrap;
  }
  .stat-filter select {
    padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; background: white; cursor: pointer;
  }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">🏏 Cricket Analytics</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="menuItems">
      </ul>
      <span class="navbar-text me-3" id="navUser" style="color:#e2e8f0; font-size:0.9rem; font-weight:500;"></span>
      <button class="btn btn-outline-light btn-sm me-2" onclick="renderHome()" id="backBtn" style="display:none;">← Back</button>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <div class="hero">
    <h4 class="mb-1">Administration Control Center</h4>
    <div>Manage player master data and match performance records.</div>
  </div>
  <div id="content" class="panel"></div>
</div>

<script>
var currentFilterContext = {}; // Global to track active filters for stats display

function showMessage(html){ document.getElementById('content').innerHTML = '<div class="alert alert-info">'+html+'</div>'; document.getElementById('backBtn').style.display='inline-block'; }
function renderHome(){
  document.getElementById('content').innerHTML =
    '<h5 class="mb-2">Admin Console</h5>'+
    '<div class="text-muted mb-3">Use admin actions to maintain player and performance data only.</div>'+
    '<div class="action-grid">'+
      '<button class="action-btn bg5" onclick="viewPlayers()">Maintain Records</button>'+
      '<button class="action-btn bg4" onclick="viewMatches()">View Matches</button>'+
      '<button class="action-btn bg1" onclick="renderAddPlayerForm()">Add Player</button>'+
      '<button class="action-btn bg6" onclick="renderAddMatchForm()">Add Match</button>'+
      '<button class="action-btn bg2" onclick="renderAddPerfForm()">Record Performance</button>'+
      '<button class="action-btn bg7" onclick="renderRecalculateForm()">Update Player Stats</button>'+
      '<button class="action-btn bg3" onclick="renderReportHub()">Generate Report</button>'+
    '</div>';
  document.getElementById('backBtn').style.display='none';
}
function ensureLoggedIn(){
  var role = (sessionStorage.getItem('role') || '').toLowerCase();
  var user = sessionStorage.getItem('user');
  if(!role || !user) { window.location='login.html'; return; }
  if(role !== 'admin') { window.location='dashboard.html'; return; }
  document.getElementById('navUser').textContent = user;
}
function logout(){ sessionStorage.clear(); window.location='login.html'; }
function viewPlayers(){ 
  fetch('/api/players/stats').then(r=>r.json()).then(data => renderPlayersTable(data)).catch(err=>showMessage('Error fetching players')); 
}
function renderPlayersTable(data){
  if(!data.length){ showMessage('No players found'); return; }
  
  // Sort by player ID ascending
  var sorted = [...data];
  sorted.sort((a,b) => a.playerId - b.playerId);
  
  var html='<h5 class="mb-3">Players <span class="badge text-bg-primary">'+data.length+' records</span></h5>';
  html+='<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>ID</th><th>Name</th><th>Country</th><th>Role</th><th>Matches</th><th>Runs</th><th>Wickets</th><th>Avg SR</th><th>Avg Economy</th><th style="width:80px;">Action</th></tr></thead><tbody>';
  sorted.forEach(p=>{ 
    html+='<tr id="player-row-'+p.playerId+'"><td>'+p.playerId+'</td><td>'+p.name+'</td><td>'+p.country+'</td><td>'+p.role+'</td><td>'+p.matchesPlayed+'</td><td><strong>'+p.totalRuns+'</strong></td><td><strong>'+p.totalWickets+'</strong></td><td>'+p.avgStrikeRate+'</td><td>'+p.avgEconomy+'</td><td><button class="btn btn-sm btn-outline-danger" onclick="confirmDeletePlayer('+p.playerId+',\''+p.name.replace(/'/g,"\\'")+'\')" title="Delete player">🗑️</button></td></tr>'; 
  });
  html+='</tbody></table></div><button class="btn btn-outline-secondary mt-3" onclick="renderHome()">Back to Home</button>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('backBtn').style.display='inline-block';
}
function renderSearchForm(){
  document.getElementById('content').innerHTML =
    '<h5 class="mb-4" style="font-weight:700; color:#0f172a;">Search & Filter Players</h5>'+
    '<form class="row g-4">'+
    '<div class="col-md-3">'+
      '<label class="form-label" style="font-weight:600; font-size:0.9rem; color:#475569;">Player Name</label>'+
      '<input id="searchName" class="form-control" placeholder="e.g., Virat Kohli" style="border-radius:8px; border:1px solid #cbd5e1;">'+
    '</div>'+
    '<div class="col-md-2">'+
      '<label class="form-label" style="font-weight:600; font-size:0.9rem; color:#475569;">Country</label>'+
      '<input id="searchCountry" class="form-control" placeholder="e.g., India" style="border-radius:8px; border:1px solid #cbd5e1;">'+
    '</div>'+
    '<div class="col-md-2">'+
      '<label class="form-label" style="font-weight:600; font-size:0.9rem; color:#475569;">Role</label>'+
      '<select id="searchRole" class="form-control" style="border-radius:8px; border:1px solid #cbd5e1;">'+
        '<option value="">All Roles</option>'+
        '<option value="BATSMAN">Batsman</option>'+
        '<option value="BOWLER">Bowler</option>'+
        '<option value="ALL-ROUNDER">All-Rounder</option>'+
        '<option value="WICKET-KEEPER">Wicket-Keeper</option>'+
      '</select>'+
    '</div>'+
    '<div class="col-md-2">'+
      '<label class="form-label" style="font-weight:600; font-size:0.9rem; color:#475569;">Year</label>'+
      '<input id="filterYear" class="form-control" type="number" min="1900" max="2100" placeholder="e.g., 2024" style="border-radius:8px; border:1px solid #cbd5e1;">'+
    '</div>'+
    '<div class="col-md-2">'+
      '<label class="form-label" style="font-weight:600; font-size:0.9rem; color:#475569;">Format</label>'+
      '<select id="filterFormat" class="form-control" style="border-radius:8px; border:1px solid #cbd5e1;">'+
        '<option value="">All Formats</option>'+
        '<option value="TEST">Test</option>'+
        '<option value="ODI">ODI</option>'+
        '<option value="T20">T20</option>'+
      '</select>'+
    '</div>'+
    '</form>'+
    '<form class="row g-4 mt-2">'+
    '<div class="col-md-4">'+
      '<label class="form-label" style="font-weight:600; font-size:0.9rem; color:#475569;">Tournament</label>'+
      '<input id="filterTournament" class="form-control" placeholder="e.g., ICC Cricket World Cup" style="border-radius:8px; border:1px solid #cbd5e1;">'+
    '</div>'+
    '<div class="col-md-2" style="display:flex; align-items:flex-end;">'+
      '<button class="btn btn-primary w-100" type="button" onclick="doSearch()" style="border-radius:8px; font-weight:600; padding:10px;">Search</button>'+
    '</div>'+
    '<div class="col-md-2" style="display:flex; align-items:flex-end;">'+
      '<button class="btn btn-outline-secondary w-100" type="button" onclick="renderHome()" style="border-radius:8px; font-weight:600; padding:10px;">Back</button>'+
    '</div>'+
    '</form>'+
    '<div class="form-text mt-3" style="color:#64748b; font-size:0.95rem;">All fields are optional. Combine any filters to search and analyze players.</div>'+
    '<div id="searchResults"></div>';
  document.getElementById('backBtn').style.display='inline-block';
}
function doSearch(){
  var name = (document.getElementById('searchName').value || '').trim();
  var country = (document.getElementById('searchCountry').value || '').trim();
  var role = (document.getElementById('searchRole').value || '').trim();
  var year = (document.getElementById('filterYear').value || '').trim();
  var format = (document.getElementById('filterFormat').value || '').trim();
  var tournament = (document.getElementById('filterTournament').value || '').trim();

  var requests = [];
  var labels = [];

  if(name){
    requests.push(fetch('/api/search?name=' + encodeURIComponent(name)).then(r=>r.json()));
    labels.push('Name');
  } else {
    requests.push(fetch('/api/players').then(r=>r.json()));
  }
  if(country){
    requests.push(fetch('/api/filter/country?country=' + encodeURIComponent(country)).then(r=>r.json()));
    labels.push('Country');
  }
  if(role){
    requests.push(fetch('/api/filter/role?role=' + encodeURIComponent(role)).then(r=>r.json()));
    labels.push('Role');
  }
  if(year){
    requests.push(fetch('/api/filter/year?year=' + encodeURIComponent(year)).then(r=>r.json()));
    labels.push('Year');
  }
  if(format){
    requests.push(fetch('/api/filter/format?format=' + encodeURIComponent(format)).then(r=>r.json()));
    labels.push('Format');
  }
  if(tournament){
    requests.push(fetch('/api/filter/tournament?tournament=' + encodeURIComponent(tournament)).then(r=>r.json()));
    labels.push('Tournament');
  }

  Promise.all(requests).then(results => {
    var map = new Map();
    (results[0] || []).forEach(p => map.set(p.playerId, p));

    for(var i = 1; i < results.length; i++){
      var allowed = new Set((results[i] || []).map(p => p.playerId));
      Array.from(map.keys()).forEach(id => {
        if(!allowed.has(id)) map.delete(id);
      });
    }

    var finalResults = Array.from(map.values());
    if(!finalResults.length){ showMessage('No players found for selected search/filter'); return; }
    var heading = labels.length ? ('Search Results (' + labels.join(' + ') + ')') : 'Search Results';
    var filterContext = {
      hasName: name ? true : false,
      hasCountry: country ? true : false,
      hasRole: role ? true : false,
      hasYear: year ? true : false,
      hasFormat: format ? true : false,
      hasTournament: tournament ? true : false,
      year: year,
      format: format,
      tournament: tournament
    };
    renderPlayerProfileCards(finalResults, heading, 'renderSearchForm', 'text-bg-danger', filterContext);
  }).catch(()=>showMessage('Error searching players'));
}
function renderPlayerProfileCards(data, heading, backFn, badgeClass, filterContext){
  var title = heading || 'Search Results';
  var backHandler = backFn || 'renderSearchForm';
  var badge = badgeClass || 'text-bg-danger';
  var ctx = filterContext || {};
  currentFilterContext = ctx; // Store globally for use in renderStatsTable
  var html = '<h5 class="mb-2">'+title+' <span class="badge '+badge+'">'+data.length+' found</span></h5>';
  
  // Determine which stat type to auto-load based on filter priority: Tournament > Format > Year
  var autoLoadStatType = null;
  var filterLabel = '';
  if(ctx.hasTournament){
    autoLoadStatType = 'tournament';
    filterLabel = ctx.tournament ? ' ('+ctx.tournament+')' : '';
  } else if(ctx.hasFormat){
    autoLoadStatType = 'career';
    filterLabel = ctx.format ? ' ('+ctx.format+')' : '';
  } else if(ctx.hasYear){
    autoLoadStatType = 'yearly';
    filterLabel = ctx.year ? ' ('+ctx.year+')' : '';
  }
  
  data.forEach(p=>{
    html += '<div class="player-card">'+
      '<div class="player-header">'+
        '<div>'+
          '<div class="player-name">'+p.name+'</div>'+
          '<div class="player-meta">'+p.country+' • '+p.role+'</div>'+
        '</div>'+
      '</div>';
    
    // If filters are applied, show the filter info and auto-load stats
    if(ctx.hasYear || ctx.hasFormat || ctx.hasTournament){
      html += '<div class="stat-filter">'+
        '<label style="margin:0; font-weight:600; color:#0f172a;">Stats'+filterLabel+':</label>';
      
      if(ctx.hasTournament){
        html += '<span style="padding:8px 12px; display:block; color:#1e293b; background:#f1f5f9; border-radius:4px; margin-top:4px;">Tournament: '+ctx.tournament+'</span>';
      } else if(ctx.hasFormat){
        html += '<span style="padding:8px 12px; display:block; color:#1e293b; background:#f1f5f9; border-radius:4px; margin-top:4px;">Format: '+ctx.format+'</span>';
      } else if(ctx.hasYear){
        html += '<span style="padding:8px 12px; display:block; color:#1e293b; background:#f1f5f9; border-radius:4px; margin-top:4px;">Year: '+ctx.year+'</span>';
      }
      html += '</div>';
    } else {
      // No filters - show dropdown to select stats type
      html += '<div class="stat-filter">'+
        '<label style="margin:0; font-weight:600; color:#0f172a;">View Stats:</label>'+
        '<select onchange="loadPlayerStats('+p.playerId+', this.value)" style="padding:8px 12px; border:1px solid #cbd5e1; border-radius:6px; margin-top:4px;">'+
          '<option value="">--Select--</option>'+
          '<option value="career">Career Summary</option>'+
          '<option value="yearly">Year-wise Breakdown</option>'+
          '<option value="tournament">Tournament Breakdown</option>'+
        '</select>'+
      '</div>';
    }
    
    html += '<div id="statsContent_'+p.playerId+'"></div>'+
    '</div>';
    
    // Auto-load stats if filter context exists
    if(autoLoadStatType){
      setTimeout(()=>{ loadPlayerStats(p.playerId, autoLoadStatType); }, 100);
    }
  });
  html += '<button class="btn btn-outline-secondary mt-3" onclick="'+backHandler+'()">Back</button>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('backBtn').style.display='inline-block';
}
function loadPlayerStats(playerId, statType){
  if(!statType) return;
  fetch('/api/stats/'+statType+'?id='+playerId)
    .then(r=>r.text())
    .then(t=>renderStatsTable(playerId, statType, t))
    .catch(()=>alert('Error loading stats'));
}
function renderStatsTable(playerId, type, rawText){
  var lines = rawText.split('\n').filter(l=>l.trim());
  if(lines.length < 2){ document.getElementById('statsContent_'+playerId).innerHTML = '<p>No data</p>'; return; }
  
  var html = '';
  
  if(type === 'career'){
    html = '<table class="stat-table"><thead><tr><th>Matches</th><th>Runs</th><th>Wickets</th><th>Avg SR</th><th>Avg Economy</th></tr></thead><tbody><tr>';
    var matches = 0, runs = 0, wickets = 0, sr = 0, eco = 0;
    for(var i = 0; i < lines.length; i++){
      var line = lines[i];
      if(line.includes('Matches:')) matches = line.split(':')[1].trim();
      else if(line.includes('Total Runs')) runs = line.split(':')[1].trim();
      else if(line.includes('Total Wickets')) wickets = line.split(':')[1].trim();
      else if(line.includes('Avg Strike Rate')) sr = line.split(':')[1].trim();
      else if(line.includes('Avg Economy')) eco = line.split(':')[1].trim();
    }
    html += '<td>'+matches+'</td><td>'+runs+'</td><td>'+wickets+'</td><td>'+sr+'</td><td>'+eco+'</td></tr></tbody></table>';
  } else if(type === 'yearly'){
    html = '<table class="stat-table"><thead><tr><th>Year</th><th>Matches</th><th>Runs</th><th>Wickets</th></tr></thead><tbody>';
    var selectedYear = currentFilterContext.year;
    for(var i = 0; i < lines.length; i++){
      var parts = lines[i].split(' -> ');
      if(parts.length === 2){
        var year = parts[0].trim();
        // If year filter is active, only show that year; otherwise show all
        if(selectedYear && year !== selectedYear) continue;
        var stats = parts[1];
        var m = stats.match(/Matches: (\d+), Runs: (\d+), Wickets: (\d+)/);
        if(m) html += '<tr><td>'+year+'</td><td>'+m[1]+'</td><td>'+m[2]+'</td><td>'+m[3]+'</td></tr>';
      }
    }
    html += '</tbody></table>';
  } else if(type === 'tournament'){
    html = '<table class="stat-table"><thead><tr><th>Tournament</th><th>Matches</th><th>Runs</th><th>Wickets</th></tr></thead><tbody>';
    var selectedTournament = currentFilterContext.tournament;
    for(var i = 0; i < lines.length; i++){
      var parts = lines[i].split(' -> ');
      if(parts.length === 2){
        var tourn = parts[0].trim();
        // If tournament filter is active, only show that tournament; otherwise show all
        if(selectedTournament && tourn !== selectedTournament) continue;
        var stats = parts[1];
        var m = stats.match(/Matches: (\d+), Runs: (\d+), Wickets: (\d+)/);
        if(m) html += '<tr><td>'+tourn+'</td><td>'+m[1]+'</td><td>'+m[2]+'</td><td>'+m[3]+'</td></tr>';
      }
    }
    html += '</tbody></table>';
  }
  document.getElementById('statsContent_'+playerId).innerHTML = html;
}
function renderStatsForm(){
  document.getElementById('content').innerHTML =
    '<h5 class="mb-3">View Player Statistics</h5>'+
    '<div class="row"><div class="col-md-6"><label class="form-label">Player ID</label><input id="statsPid" class="form-control" type="number"></div>'+
    '<div class="col-md-6"><label class="form-label">Stats Type</label><select id="statsType" class="form-control"><option value="career">Career Stats</option><option value="yearly">Year-wise Stats</option><option value="tournament">Tournament-wise Stats</option></select></div></div>'+
    '<div class="mt-3"><button class="btn btn-primary" onclick="doViewStats()">View</button> <button class="btn btn-outline-secondary" onclick="renderHome()">Back</button></div>'+
    '<div id="statsResult" class="result-box"></div>';
  document.getElementById('backBtn').style.display='inline-block';
}
function doViewStats(){
  var id = document.getElementById('statsPid').value;
  var type = document.getElementById('statsType').value;
  if(!id || !type){ showMessage('Please fill all fields'); return; }
  fetch('/api/stats/'+type+'?id='+encodeURIComponent(id))
    .then(r=>r.text())
    .then(t=>document.getElementById('statsResult').textContent=t)
    .catch(()=>showMessage('Error loading statistics'));
}
function renderAnalyzeForm(){
  document.getElementById('content').innerHTML =
    '<h5 class="mb-3">Analyze Player Performance</h5>'+
    '<div class="mb-3"><label class="form-label">Player ID</label><input id="analyzeId" class="form-control" type="number"></div>'+
    '<div class="mb-3"><button class="btn btn-primary" onclick="doAnalyze()">Analyze</button> <button class="btn btn-outline-secondary" onclick="renderHome()">Back</button></div>'+
    '<div id="analyzeResult" class="result-box"></div>';
  document.getElementById('backBtn').style.display='inline-block';
}
function doAnalyze(){
  var id = document.getElementById('analyzeId').value;
  fetch('/api/analyze?id='+id).then(r=>r.text()).then(t=>document.getElementById('analyzeResult').textContent=t).catch(()=>showMessage('Error analyzing'));
}
function renderCompareForm(){
  document.getElementById('content').innerHTML =
    '<h5 class="mb-3">Compare Players</h5>'+
    '<div class="row"><div class="col-md-6"><label class="form-label">Player 1 ID</label><input id="cmp1" class="form-control" type="number"></div>'+
    '<div class="col-md-6"><label class="form-label">Player 2 ID</label><input id="cmp2" class="form-control" type="number"></div></div>'+
    '<div class="mt-3"><button class="btn btn-primary" onclick="doCompare()">Compare</button> <button class="btn btn-outline-secondary" onclick="renderHome()">Back</button></div>'+
    '<div id="compareResult" class="result-box"></div>';
  document.getElementById('backBtn').style.display='inline-block';
}
function doCompare(){
  var id1=document.getElementById('cmp1').value;
  var id2=document.getElementById('cmp2').value;
  fetch('/api/compare?id1='+id1+'&id2='+id2).then(r=>r.text()).then(t=>document.getElementById('compareResult').textContent=t).catch(()=>showMessage('Error comparing'));
}
function renderReportHub(){
  document.getElementById('content').innerHTML =
    '<div style="text-align:center; margin-bottom:24px;">'+

var adminAllPlayers = [];
var currentReportTab = 'player';
function switchReportTab(tab){
  currentReportTab = tab;
  var tabs = ['Player','Season','Comparison'];
  tabs.forEach(function(t){
    var btn = document.getElementById('tab'+t+'Report');
    if(t.toLowerCase()===tab){
      btn.style.background='linear-gradient(135deg,#0f172a,#334155)'; btn.style.color='white'; btn.className='btn btn-lg';
    } else {
      btn.style.background=''; btn.style.color=''; btn.className='btn btn-lg btn-outline-dark';
    }
  });
  if(tab==='player') buildPlayerReportTab();
  else if(tab==='season') buildSeasonReportTab();
  else if(tab==='comparison') buildComparisonReportTab();
}

// ==================== PLAYER REPORT TAB ====================
function buildPlayerReportTab(){
  if(!adminAllPlayers.length){
    fetch('/api/players').then(function(r){return r.json();}).then(function(players){
      adminAllPlayers = players;
      renderPlayerReportUI();
    }).catch(function(){document.getElementById('reportTabContent').innerHTML='<div class="alert alert-danger">Error loading players</div>';});
  } else { renderPlayerReportUI(); }
}
function renderPlayerReportUI(){
  document.getElementById('reportTabContent').innerHTML =
    '<div class="row mb-4">'+
      '<div class="col-md-8" style="position:relative;">'+
        '<label class="form-label" style="font-weight:700; color:#0f172a;">🏏 Search Player</label>'+
        '<input id="rptPlayerInput" class="form-control" type="text" placeholder="Type player name..." autocomplete="off" oninput="filterRptPlayers()" style="padding:12px; font-size:1rem; border-radius:10px; border:2px solid #0f172a;">'+
        '<div id="rptPlayerDropdown" style="position:absolute; background:white; border:1px solid #cbd5e1; border-top:none; border-radius:0 0 10px 10px; max-height:240px; overflow-y:auto; width:calc(100% - 24px); z-index:1000; display:none; box-shadow:0 6px 20px rgba(0,0,0,0.15);"></div>'+

      '</div>'+
    '</div>'+
    '<div id="rptResult"></div>';
}
function filterRptPlayers(){
  var input = document.getElementById('rptPlayerInput').value.toLowerCase();
  var dropdown = document.getElementById('rptPlayerDropdown');
  document.getElementById('rptPlayerId').value = '';
  document.getElementById('rptPlayerBadge').innerHTML = '';
  if(!input || input.length < 1){dropdown.style.display='none'; return;}
  var filtered = adminAllPlayers.filter(function(p){return p.name.toLowerCase().includes(input);});
  if(!filtered.length){dropdown.innerHTML='<div style="padding:12px; color:#94a3b8;">No players found</div>'; dropdown.style.display='block'; return;}
  dropdown.innerHTML='';
  filtered.slice(0,10).forEach(function(p){
    var item = document.createElement('div');
    item.style.cssText='padding:10px 14px; cursor:pointer; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;';
    var roleBg = p.role.toLowerCase().includes('bat') ? '#3b82f6' : p.role.toLowerCase().includes('bowl') ? '#10b981' : '#f59e0b';
    item.innerHTML='<span style="font-weight:600; color:#0f172a;">'+p.name+'</span><span style="background:'+roleBg+'; color:white; padding:2px 8px; border-radius:8px; font-size:0.75rem; font-weight:600;">'+p.role+'</span>';
    item.onmouseover=function(){this.style.background='#f8fafc';};
    item.onmouseout=function(){this.style.background='white';};
    item.onclick=function(){
      document.getElementById('rptPlayerInput').value=p.name;
      document.getElementById('rptPlayerId').value=p.playerId;
      dropdown.style.display='none';
      var rb=p.role.toLowerCase().includes('bat')?'#3b82f6':p.role.toLowerCase().includes('bowl')?'#10b981':'#f59e0b';
      document.getElementById('rptPlayerBadge').innerHTML='<span style="background:'+rb+'; color:white; padding:4px 12px; border-radius:10px; font-size:0.8rem; font-weight:600;">'+p.role+' • '+p.country+'</span>';
    };
    dropdown.appendChild(item);
  });
  dropdown.style.display='block';
}
function doPlayerReport(){
  var pid = document.getElementById('rptPlayerId').value;
  if(!pid){alert('Please search and select a player first'); return;}
  var pname = document.getElementById('rptPlayerInput').value;
  var resDiv = document.getElementById('rptResult');
  resDiv.innerHTML='<div style="text-align:center; padding:40px;"><div class="spinner-border" style="color:#0f172a; width:3rem; height:3rem;" role="status"></div><p style="margin-top:12px; color:#64748b;">Generating career report for <strong>'+pname+'</strong>...</p></div>';
  fetch('/api/report?id='+pid).then(function(r){return r.json();}).then(function(d){
    if(d.error){resDiv.innerHTML='<div style="background:#fef2f2; border:2px solid #fca5a5; color:#991b1b; padding:16px; border-radius:12px;">'+d.error+'</div>'; return;}
    renderFullPlayerReport(d);
  }).catch(function(){resDiv.innerHTML='<div style="background:#fef2f2; border:2px solid #fca5a5; color:#991b1b; padding:16px; border-radius:12px;">Error generating report.</div>';});
}

        '<div style="font-size:0.75rem; color:#94a3b8; margin-bottom:4px;">'+medal+' '+(b.tournament||b.format)+'</div>'+
        '<div style="font-size:1.8rem; font-weight:900; color:#10b981;">'+b.wickets+'<span style="font-size:0.8rem; color:#94a3b8;">/'+b.runs+'</span></div>'+

    });

function rptStatCard(label, value, color){

    '<div style="font-size:1.5rem; font-weight:900; color:'+color+';">'+value+'</div>'+

// ==================== COMPARISON REPORT TAB ====================
function buildComparisonReportTab(){
  if(!adminAllPlayers.length){
    fetch('/api/players').then(function(r){return r.json();}).then(function(players){
      adminAllPlayers = players;
      renderComparisonReportUI();
    }).catch(function(){document.getElementById('reportTabContent').innerHTML='<div class="alert alert-danger">Error loading players</div>';});
  } else { renderComparisonReportUI(); }
}

    '<div class="row mb-4">'+
      '<div class="col-md-5" style="position:relative;">'+

function filterCmpPlayers(num){
  var input = document.getElementById('cmpInput'+num).value.toLowerCase();
  var dropdown = document.getElementById('cmpDropdown'+num);
  document.getElementById('cmpPlayerId'+num).value = '';
  document.getElementById('cmpBadge'+num).innerHTML = '';
  if(!input || input.length < 1){dropdown.style.display='none'; return;}
  var filtered = adminAllPlayers.filter(function(p){return p.name.toLowerCase().includes(input);});
  if(!filtered.length){dropdown.innerHTML='<div style="padding:12px; color:#94a3b8;">No players found</div>'; dropdown.style.display='block'; return;}
  dropdown.innerHTML='';
  filtered.slice(0,8).forEach(function(p){
    var item = document.createElement('div');
    item.style.cssText='padding:10px 14px; cursor:pointer; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;';
    var roleBg = p.role.toLowerCase().includes('bat') ? '#3b82f6' : p.role.toLowerCase().includes('bowl') ? '#10b981' : '#f59e0b';
    item.innerHTML='<span style="font-weight:600; color:#0f172a;">'+p.name+'</span><span style="background:'+roleBg+'; color:white; padding:2px 8px; border-radius:8px; font-size:0.75rem; font-weight:600;">'+p.role+'</span>';
    item.onmouseover=function(){this.style.background='#f8fafc';};
    item.onmouseout=function(){this.style.background='white';};
    item.onclick=function(){
      document.getElementById('cmpInput'+num).value=p.name;
      document.getElementById('cmpPlayerId'+num).value=p.playerId;
      dropdown.style.display='none';
      var rb=p.role.toLowerCase().includes('bat')?'#3b82f6':p.role.toLowerCase().includes('bowl')?'#10b981':'#f59e0b';
      document.getElementById('cmpBadge'+num).innerHTML='<span style="background:'+rb+'; color:white; padding:4px 12px; border-radius:10px; font-size:0.8rem; font-weight:600;">'+p.role+' • '+p.country+'</span>';
    };
    dropdown.appendChild(item);
  });
  dropdown.style.display='block';
}
function doComparisonReport(){
  var pid1 = document.getElementById('cmpPlayerId1').value;
  var pid2 = document.getElementById('cmpPlayerId2').value;
  if(!pid1 || !pid2){alert('Please select both players first'); return;}
  var resDiv = document.getElementById('cmpRptResult');
  resDiv.innerHTML='<div style="text-align:center; padding:40px;"><div class="spinner-border" style="color:#0f172a; width:3rem; height:3rem;" role="status"></div><p style="margin-top:12px; color:#64748b;">Generating comparison report...</p></div>';
  fetch('/api/comparisonReport?id1='+pid1+'&id2='+pid2).then(function(r){return r.json();}).then(function(d){
    if(d.error){resDiv.innerHTML='<div class="alert alert-danger">'+d.error+'</div>'; return;}
    renderComparisonReport(d);
  }).catch(function(){resDiv.innerHTML='<div class="alert alert-danger">Error generating comparison report.</div>';});
}

      '<p style="color:#94a3b8; font-size:0.82rem; margin-bottom:14px;">Matches where both players participated • '+p1.name+' dominated '+d.h2hP1Wins+'x, '+p2.name+' dominated '+d.h2hP2Wins+'x</p>'+
      '<div class="table-responsive"><table class="table table-sm mb-0" style="font-size:0.85rem;">'+
      '<thead style="background:#1e293b; color:white;"><tr><th style="padding:8px;">Date</th><th style="padding:8px;">Format</th><th style="padding:8px;">Match</th><th style="padding:8px;">'+p1.name+'</th><th style="padding:8px;">'+p2.name+'</th></tr></thead><tbody>';
    d.headToHead.forEach(function(h,i){
      var bg = i%2===0?'':'background:#f8fafc;';
      html+='<tr style="'+bg+'"><td style="padding:8px; color:#64748b;">'+h.date+'</td>'+
        '<td style="padding:8px;"><span style="background:'+(fmtClr[h.format]||'#64748b')+'; color:white; padding:2px 8px; border-radius:6px; font-size:0.75rem; font-weight:700;">'+h.format+'</span></td>'+
        '<td style="padding:8px; font-weight:600;">'+h.match+'</td>'+
        '<td style="padding:8px;"><span style="color:#2563eb; font-weight:700;">'+h.p1Runs+'</span>r <span style="color:#10b981;">'+h.p1Wkts+'</span>w</td>'+
        '<td style="padding:8px;"><span style="color:#2563eb; font-weight:700;">'+h.p2Runs+'</span>r <span style="color:#10b981;">'+h.p2Wkts+'</span>w</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }
  html+='<div style="text-align:center; padding:16px; color:#94a3b8; font-size:0.8rem; border-top:1px solid #e2e8f0; margin-top:8px;">⚔️ Comparison Report: <strong style="color:#0f172a;">'+p1.name+' vs '+p2.name+'</strong> • Cricket Performance Analysis System</div>';
  resDiv.innerHTML = html;
  var fmtClr={TEST:'#dc2626',ODI:'#2563eb',T20:'#16a34a'};
}

function toggleStyleFields(){
  var role = document.getElementById('newRole').value;
  var batRow = document.getElementById('battingStyleRow');
  var bowlRow = document.getElementById('bowlingStyleRow');
  if(role === 'BATSMAN'){ batRow.style.display='block'; bowlRow.style.display='none'; }
  else if(role === 'BOWLER'){ batRow.style.display='none'; bowlRow.style.display='block'; }
  else { batRow.style.display='block'; bowlRow.style.display='block'; }
}
function doAddPlayer(){
  var n=document.getElementById('newName').value;

  var bs=document.getElementById('newBattingStyle').value;
  var bw=document.getElementById('newBowlingStyle').value;
  var dy=document.getElementById('newDebutYear').value;
  fetch('/api/addPlayer',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'name='+encodeURIComponent(n)+'&country='+encodeURIComponent(c)+'&role='+encodeURIComponent(r)+'&battingStyle='+encodeURIComponent(bs)+'&bowlingStyle='+encodeURIComponent(bw)+'&debutYear='+encodeURIComponent(dy)})

function doAddMatch(){
  var payload = new URLSearchParams();
  payload.append('date', document.getElementById('matchDate').value);
  payload.append('format', document.getElementById('matchFmt').value);
  payload.append('tournament', document.getElementById('matchTournament').value);
  payload.append('series', document.getElementById('matchSeries').value);
  payload.append('season', document.getElementById('matchSeason').value);
  payload.append('venue', document.getElementById('matchVenue').value);
  payload.append('team1', document.getElementById('matchTeam1').value);
  payload.append('team2', document.getElementById('matchTeam2').value);
  payload.append('tossWinner', document.getElementById('matchTossWinner').value);
  payload.append('battingFirst', document.getElementById('matchBattingFirst').value);
  payload.append('battingSecond', document.getElementById('matchBattingSecond').value);
  payload.append('matchWinner', document.getElementById('matchWinner').value);

  var team1Runs = document.getElementById('matchTeam1Runs').value;
  var team1Wkts = document.getElementById('matchTeam1Wkts').value;
  var team2Runs = document.getElementById('matchTeam2Runs').value;
  var team2Wkts = document.getElementById('matchTeam2Wkts').value;
  if (team1Runs !== '') payload.append('team1Runs', team1Runs);
  if (team1Wkts !== '') payload.append('team1Wickets', team1Wkts);
  if (team2Runs !== '') payload.append('team2Runs', team2Runs);
  if (team2Wkts !== '') payload.append('team2Wickets', team2Wkts);

  fetch('/api/addMatch',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:payload.toString()})
    .then(r=>r.text()).then(txt=>document.getElementById('addMatchResult').textContent=txt);
}
function viewMatches(){
  fetch('/api/matches').then(r=>r.json()).then(data=>{
    if(!data.length){ showMessage('No matches found'); return; }
    var html='<h5 class="mb-3">Matches <span class="badge text-bg-primary">'+data.length+' records</span></h5>';
    html+='<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>Match ID</th><th>Date</th><th>Format</th><th>Tournament</th><th>Series</th><th>Teams</th><th>Toss</th><th>Batting Order</th><th>Winner</th><th>Score</th></tr></thead><tbody>';
    html+='<div class="table-responsive"><table class="table table-striped table-hover"><thead class="table-dark"><tr><th>Match ID</th><th>Date</th><th>Format</th><th>Tournament</th><th>Series</th><th>Teams</th><th>Toss</th><th>Batting Order</th><th>Winner</th><th>Score</th><th style="width:80px;">Action</th></tr></thead><tbody>';
    data.forEach(m=>{
      var score1 = (m.team1Runs === null || m.team1Runs === undefined) ? '-' : m.team1Runs + '/' + ((m.team1Wickets === null || m.team1Wickets === undefined) ? '-' : m.team1Wickets);
      var score2 = (m.team2Runs === null || m.team2Runs === undefined) ? '-' : m.team2Runs + '/' + ((m.team2Wickets === null || m.team2Wickets === undefined) ? '-' : m.team2Wickets);
      var teamsLabel = (m.team1||'-')+' vs '+(m.team2||'-');
      html+='<tr id="match-row-'+m.matchId+'"><td><strong>'+m.matchId+'</strong></td><td>'+m.date+'</td><td>'+m.format+'</td><td><span style="color:#2563eb; font-weight:600;">'+(m.tournament||'-')+'</span></td><td><span style="color:#7c3aed; font-weight:600;">'+(m.series||'-')+'</span></td><td>'+teamsLabel+'</td><td>'+(m.tossWinner||'-')+'</td><td>'+(m.battingFirst||'-')+' / '+(m.battingSecond||'-')+'</td><td>'+(m.matchWinner||'-')+'</td><td>'+(m.team1||'Team1')+' '+score1+' | '+(m.team2||'Team2')+' '+score2+'</td><td><button class="btn btn-sm btn-outline-danger" onclick="confirmDeleteMatch('+m.matchId+',\''+teamsLabel.replace(/'/g,"\\'")+'\')" title="Delete match">🗑️</button></td></tr>';
    });
    html+='</tbody></table></div><button class="btn btn-outline-secondary mt-3" onclick="renderHome()">Back to Home</button>';
    document.getElementById('content').innerHTML = html;
    document.getElementById('backBtn').style.display='inline-block';
  }).catch(()=>showMessage('Error fetching matches'));
}

    .then(r=>r.text()).then(txt=>document.getElementById('recalcResult').textContent=txt);

function confirmDeletePlayer(playerId, playerName){
  if(!confirm('Are you sure you want to delete player "'+playerName+'" (ID: '+playerId+')?\n\nThis will also delete ALL match performances for this player. This action cannot be undone.')) return;
  var row = document.getElementById('player-row-'+playerId);
  if(row) row.style.opacity='0.4';
  fetch('/api/deletePlayer?id='+playerId).then(r=>r.json()).then(d=>{
    if(d.success){
      if(row) row.style.transition='all 0.3s'; if(row) row.style.opacity='0'; setTimeout(function(){viewPlayers();}, 400);
      alert('✅ '+d.message);
    } else {
      if(row) row.style.opacity='1';
      alert('❌ '+d.message);
    }
  }).catch(function(){if(row)row.style.opacity='1'; alert('Error deleting player');});
}
function confirmDeleteMatch(matchId, matchLabel){
  if(!confirm('Are you sure you want to delete match #'+matchId+' ('+matchLabel+')?\n\nThis will also delete ALL player performances for this match. This action cannot be undone.')) return;
  var row = document.getElementById('match-row-'+matchId);
  if(row) row.style.opacity='0.4';
  fetch('/api/deleteMatch?id='+matchId).then(r=>r.json()).then(d=>{
    if(d.success){
      if(row) row.style.transition='all 0.3s'; if(row) row.style.opacity='0'; setTimeout(function(){viewMatches();}, 400);
      alert('✅ '+d.message);
    } else {
      if(row) row.style.opacity='1';
      alert('❌ '+d.message);
    }
  }).catch(function(){if(row)row.style.opacity='1'; alert('Error deleting match');});
}
